name: build-desktop-all-os-on-release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-all-os-${{ github.event.release.id }}
  cancel-in-progress: false

jobs:
  build:
    name: shob build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            platform: --win
            arch: --x64
            extra: --config.win.signAndEditExecutable=false
          - label: windows-arm64
            os: windows-latest
            platform: --win
            arch: --arm64
            extra: --config.win.signAndEditExecutable=false
          - label: mac-x64
            os: macos-13
            platform: --mac
            arch: --x64
            extra: --config.mac.notarize=false --config.dmg.sign=false --config.mac.hardenedRuntime=false
          - label: mac-arm64
            os: macos-14
            platform: --mac
            arch: --arm64
            extra: --config.mac.notarize=false --config.dmg.sign=false --config.mac.hardenedRuntime=false
          - label: linux-x64
            os: ubuntu-latest
            platform: --linux
            arch: --x64
            extra: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: bun install

      - name: Seed required metadata
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .github -Force | Out-Null
          if (-not (Test-Path .github/TEAM_MEMBERS)) {
            "seraprogrammer" | Set-Content .github/TEAM_MEMBERS
          }

      - name: Resolve release version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ($tag.StartsWith("v")) { $tag = $tag.Substring(1) }
          "version=$tag" >> $env:GITHUB_OUTPUT

      - name: Prepare desktop electron
        working-directory: packages/desktop-electron
        env:
          OPENCODE_VERSION: ${{ steps.ver.outputs.version }}
          OPENCODE_CHANNEL: prod
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: bun ./scripts/prepare.ts

      - name: Build desktop electron
        working-directory: packages/desktop-electron
        env:
          OPENCODE_CHANNEL: prod
        run: bun run build

      - name: Package desktop electron
        working-directory: packages/desktop-electron
        env:
          OPENCODE_CHANNEL: prod
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder ${{ matrix.platform }} ${{ matrix.arch }} --publish never --config electron-builder.config.ts ${{ matrix.extra }}

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: |
            packages/desktop-electron/dist/*

      - name: Upload to release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          fail_on_unmatched_files: false
          files: |
            packages/desktop-electron/dist/*.exe
            packages/desktop-electron/dist/*.zip
            packages/desktop-electron/dist/*.dmg
            packages/desktop-electron/dist/*.AppImage
            packages/desktop-electron/dist/*.deb
            packages/desktop-electron/dist/*.rpm
            packages/desktop-electron/dist/latest*.yml
            packages/desktop-electron/dist/latest*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}